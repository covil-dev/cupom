<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Game Dog - Tela Mobile</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app-wrapper">
    <section class="game-shell" aria-label="Área principal do minigame">
      <div class="game-screen" id="gameScreen">
        <div class="scene-reference" id="sceneReference">
          <div class="screen-background" aria-hidden="true"></div>

          <div class="dog-stage" aria-label="Área de animação do cachorro">
            <img
              id="dogSprite"
              class="dog-sprite"
              src="./assets/dog/padrao.png"
              alt="Cachorrinho animado"
            />
          </div>
        </div>
        <div class="top-panel">
          <h2 class="top-panel-title">Gatinha Premiada</h2>
          <div class="top-panel-section top-panel-header">
            <p class="top-panel-expiry">
              <span class="top-panel-expiry-clock" aria-hidden="true"></span>
              <span>Expira em 57bi de dias</span>
            </p>
          </div>

          <div class="top-panel-section top-panel-progress">
            <div class="reward-progress" aria-label="Barra de progresso de recompensa">
              <img
                class="reward-progress-icon reward-progress-icon-start"
                src="./assets/icons/ic-coracao.png"
                alt="Início do progresso"
              />

              <div
                class="reward-progress-track"
                id="rewardProgress"
                role="progressbar"
                aria-label="Progresso de recompensa"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
              >
                <div
                  class="reward-progress-fill"
                  id="rewardProgressFill"
                  style="width: 0%;"
                ></div>
              </div>

              <div class="reward-progress-markers" aria-hidden="true">
                <div class="reward-marker reward-marker-60">
                  <img
                    class="reward-marker-secret-icon"
                    src="./assets/icons/ic-segredo.png"
                    alt=""
                  />
                  <span class="reward-marker-dot"></span>
                  <span class="reward-marker-label">60%</span>
                </div>
                <div class="reward-marker reward-marker-80">
                  <img
                    class="reward-marker-secret-icon"
                    src="./assets/icons/ic-segredo.png"
                    alt=""
                  />
                  <span class="reward-marker-dot"></span>
                  <span class="reward-marker-label">80%</span>
                </div>
              </div>

              <img
                class="reward-progress-icon reward-progress-icon-end"
                src="./assets/icons/ic-presente.png"
                alt="Fim do progresso"
              />
            </div>
          </div>

          <div class="top-panel-section top-panel-footer">
            <p class="reward-progress-message">Faltam apenas alguns corações para ganhar!</p>
          </div>
        </div>

        <div class="drop-control">
          <div
            id="dropGainFeedback"
            class="drop-gain-feedback"
            aria-hidden="true"
          >
            +150
          </div>

          <output
            id="dropBalance"
            class="drop-balance"
            aria-live="polite"
            aria-label="Recompensa acumulada"
          >
            0
          </output>

          <button
            id="dropButton"
            class="drop-button"
            type="button"
            aria-label="Coletar recompensa de ração"
          >
            <img
              class="drop-button-icon"
              src="./assets/icons/bt-dropa.png"
              alt=""
              aria-hidden="true"
            />
          </button>

          <output
            id="dropCountdown"
            class="drop-countdown"
            aria-live="polite"
            aria-label="Tempo restante para receber 150 de ração"
          >
            10
          </output>
        </div>

        <div class="feed-control">
          <output
            id="globalRationBalance"
            class="feed-balance"
            aria-live="polite"
            aria-label="Saldo global de ração"
          >
            600
          </output>

          <button
            id="feedButton"
            class="feed-button"
            type="button"
            aria-label="Alimentar cachorro"
          >
            <img
              class="feed-button-icon"
              src="./assets/icons/bt-alimenta.png"
              alt=""
              aria-hidden="true"
            />
          </button>
        </div>

        <div class="ui-layer" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script src="./js/dog-animation.js"></script>
  <script src="./js/feed-button.js"></script>
  <script src="./js/drop-button.js"></script>
  <script src="./js/hearts.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
